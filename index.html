<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Clicker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a1a;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            cursor: crosshair;
            user-select: none;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0; left: 0;
        }

        .hud {
            position: fixed;
            top: 20px; left: 20px;
            color: #fff;
            z-index: 10;
            text-shadow: 0 0 10px rgba(100, 200, 255, 0.8);
        }

        .hud h1 {
            font-size: 1.4rem;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #00d2ff, #a855f7, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hud .score {
            font-size: 2.5rem;
            font-weight: 900;
            margin: 4px 0;
        }

        .hud .sub {
            font-size: 0.85rem;
            color: #888;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 10px;
        }

        .controls button {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: #ccc;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 0.85rem;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }

        .controls button:hover {
            background: rgba(255,255,255,0.15);
            color: #fff;
            border-color: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }

        .controls button.active {
            background: rgba(168, 85, 247, 0.3);
            border-color: #a855f7;
            color: #e0b0ff;
        }

        .combo {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4rem;
            font-weight: 900;
            color: #fff;
            z-index: 10;
            pointer-events: none;
            opacity: 0;
            text-shadow: 0 0 30px rgba(168, 85, 247, 0.8);
            transition: opacity 0.3s;
        }

        .float-text {
            position: fixed;
            z-index: 10;
            pointer-events: none;
            font-weight: 900;
            font-size: 1.5rem;
            animation: floatUp 1s ease-out forwards;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-80px) scale(1.5); }
        }

        .msg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            z-index: 5;
            text-align: center;
            pointer-events: none;
            opacity: 0.4;
            font-size: 1.1rem;
            letter-spacing: 1px;
            transition: opacity 0.5s;
        }
    </style>
</head>
<body>
    <canvas id="c"></canvas>

    <div class="hud">
        <h1>SPACE CLICKER</h1>
        <div class="score" id="score">0</div>
        <div class="sub">click / tap anywhere</div>
        <div class="sub" id="cps" style="margin-top:4px"></div>
    </div>

    <div class="combo" id="combo"></div>
    <div class="msg" id="msg">Click anywhere to start</div>

    <div class="controls">
        <button data-mode="firework" class="active">Firework</button>
        <button data-mode="gravity">Gravity</button>
        <button data-mode="spiral">Spiral</button>
        <button data-mode="rain">Star Rain</button>
        <button data-mode="blackhole">Black Hole</button>
    </div>

    <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let W, H;

    function resize() {
        W = canvas.width = innerWidth;
        H = canvas.height = innerHeight;
    }
    resize();
    addEventListener('resize', resize);

    // Particles
    const particles = [];
    const stars = [];
    const MAX_PARTICLES = 2000;
    let mode = 'firework';
    let score = 0;
    let comboCount = 0;
    let comboTimer = null;
    let clickTimes = [];
    let blackhole = null;

    // Background stars
    for (let i = 0; i < 200; i++) {
        stars.push({
            x: Math.random() * 3000,
            y: Math.random() * 2000,
            r: Math.random() * 1.5 + 0.3,
            twinkle: Math.random() * Math.PI * 2,
            speed: Math.random() * 0.02 + 0.005
        });
    }

    const palettes = [
        ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#a855f7'],
        ['#00d2ff','#00fff0','#7efff5','#a0e7e5','#b4f8c8'],
        ['#ff9a9e','#fad0c4','#ffecd2','#fcb69f','#ff9a9e'],
        ['#a18cd1','#fbc2eb','#f6d5f7','#c3cfe2','#e0c3fc'],
        ['#f7971e','#ffd200','#ff6b6b','#ee5a24','#fa8231'],
    ];

    function randPalette() {
        return palettes[Math.floor(Math.random() * palettes.length)];
    }

    function randColor(pal) {
        return pal[Math.floor(Math.random() * pal.length)];
    }

    function spawn(x, y) {
        const pal = randPalette();
        const count = mode === 'firework' ? 60 :
                      mode === 'gravity' ? 40 :
                      mode === 'spiral' ? 80 :
                      mode === 'rain' ? 50 :
                      mode === 'blackhole' ? 30 : 50;

        for (let i = 0; i < count && particles.length < MAX_PARTICLES; i++) {
            const angle = (Math.PI * 2 / count) * i + Math.random() * 0.3;
            const speed = Math.random() * 6 + 2;
            const p = {
                x, y,
                vx: 0, vy: 0,
                color: randColor(pal),
                life: 1,
                decay: Math.random() * 0.015 + 0.005,
                size: Math.random() * 4 + 1.5,
                angle,
                speed,
                age: 0,
                trail: [],
            };

            if (mode === 'firework') {
                p.vx = Math.cos(angle) * speed;
                p.vy = Math.sin(angle) * speed;
            } else if (mode === 'gravity') {
                p.vx = Math.cos(angle) * speed * 1.5;
                p.vy = Math.sin(angle) * speed * 1.5 - 4;
                p.decay = 0.008;
            } else if (mode === 'spiral') {
                p.cx = x; p.cy = y;
                p.radius = 0;
                p.angleSpeed = (Math.random() > 0.5 ? 1 : -1) * (Math.random() * 0.1 + 0.05);
                p.radiusSpeed = Math.random() * 2 + 1;
                p.decay = 0.006;
            } else if (mode === 'rain') {
                p.x = Math.random() * W;
                p.y = -10;
                p.vx = (Math.random() - 0.5) * 2;
                p.vy = Math.random() * 5 + 3;
                p.decay = 0.005;
                p.size = Math.random() * 3 + 1;
            } else if (mode === 'blackhole') {
                p.vx = Math.cos(angle) * speed * 3;
                p.vy = Math.sin(angle) * speed * 3;
                p.decay = 0.004;
                blackhole = { x, y, strength: 300, life: 3 };
            }

            particles.push(p);
        }
    }

    function update() {
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.age++;

            if (mode === 'spiral' && p.cx !== undefined) {
                p.angle += p.angleSpeed;
                p.radius += p.radiusSpeed;
                p.x = p.cx + Math.cos(p.angle) * p.radius;
                p.y = p.cy + Math.sin(p.angle) * p.radius;
            } else {
                if (mode === 'gravity') {
                    p.vy += 0.15;
                }

                if (blackhole && mode === 'blackhole') {
                    const dx = blackhole.x - p.x;
                    const dy = blackhole.y - p.y;
                    const dist = Math.sqrt(dx * dx + dy * dy) + 1;
                    const force = blackhole.strength / (dist * dist) * 50;
                    p.vx += (dx / dist) * force;
                    p.vy += (dy / dist) * force;
                    p.vx *= 0.98;
                    p.vy *= 0.98;
                }

                p.x += p.vx;
                p.y += p.vy;
                p.vx *= 0.98;
                p.vy *= 0.98;
            }

            p.trail.push({ x: p.x, y: p.y });
            if (p.trail.length > 6) p.trail.shift();

            p.life -= p.decay;
            if (p.life <= 0) {
                particles.splice(i, 1);
            }
        }

        if (blackhole) {
            blackhole.life -= 0.016;
            if (blackhole.life <= 0) blackhole = null;
        }
    }

    function draw() {
        ctx.fillStyle = 'rgba(10, 10, 26, 0.15)';
        ctx.fillRect(0, 0, W, H);

        // Stars
        for (const s of stars) {
            s.twinkle += s.speed;
            const alpha = 0.3 + Math.sin(s.twinkle) * 0.3;
            ctx.beginPath();
            ctx.arc(s.x % W, s.y % H, s.r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255,255,255,${alpha})`;
            ctx.fill();
        }

        // Black hole
        if (blackhole && blackhole.life > 0) {
            const grad = ctx.createRadialGradient(
                blackhole.x, blackhole.y, 0,
                blackhole.x, blackhole.y, 80
            );
            grad.addColorStop(0, `rgba(100, 0, 200, ${blackhole.life * 0.5})`);
            grad.addColorStop(0.5, `rgba(50, 0, 100, ${blackhole.life * 0.3})`);
            grad.addColorStop(1, 'transparent');
            ctx.beginPath();
            ctx.arc(blackhole.x, blackhole.y, 80, 0, Math.PI * 2);
            ctx.fillStyle = grad;
            ctx.fill();
        }

        // Particles
        for (const p of particles) {
            // Trail
            if (p.trail.length > 1) {
                ctx.beginPath();
                ctx.moveTo(p.trail[0].x, p.trail[0].y);
                for (let j = 1; j < p.trail.length; j++) {
                    ctx.lineTo(p.trail[j].x, p.trail[j].y);
                }
                ctx.strokeStyle = p.color + Math.floor(p.life * 40).toString(16).padStart(2, '0');
                ctx.lineWidth = p.size * 0.5 * p.life;
                ctx.stroke();
            }

            // Glow
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * p.life * 2, 0, Math.PI * 2);
            ctx.fillStyle = p.color + Math.floor(p.life * 25).toString(16).padStart(2, '0');
            ctx.fill();

            // Core
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
            ctx.fillStyle = p.color + Math.floor(p.life * 255).toString(16).padStart(2, '0');
            ctx.fill();
        }
    }

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }
    loop();

    // Scoring
    function addScore(x, y) {
        comboCount++;
        clearTimeout(comboTimer);
        comboTimer = setTimeout(() => { comboCount = 0; updateCombo(); }, 1500);

        const points = comboCount >= 20 ? 50 :
                       comboCount >= 10 ? 20 :
                       comboCount >= 5 ? 10 : comboCount;
        score += points;
        document.getElementById('score').textContent = score.toLocaleString();

        // Float text
        const el = document.createElement('div');
        el.className = 'float-text';
        el.textContent = `+${points}`;
        const hue = (comboCount * 30) % 360;
        el.style.color = `hsl(${hue}, 100%, 70%)`;
        el.style.left = x + 'px';
        el.style.top = y + 'px';
        el.style.textShadow = `0 0 20px hsl(${hue}, 100%, 50%)`;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 1000);

        updateCombo();

        // CPS
        const now = Date.now();
        clickTimes.push(now);
        clickTimes = clickTimes.filter(t => now - t < 3000);
        const cps = (clickTimes.length / 3).toFixed(1);
        document.getElementById('cps').textContent = `${cps} clicks/sec`;
    }

    function updateCombo() {
        const el = document.getElementById('combo');
        if (comboCount >= 5) {
            el.textContent = `${comboCount}x COMBO!`;
            el.style.opacity = '1';
            el.style.fontSize = Math.min(4 + comboCount * 0.2, 8) + 'rem';
            const hue = (comboCount * 15) % 360;
            el.style.textShadow = `0 0 30px hsl(${hue},100%,50%), 0 0 60px hsl(${hue},100%,30%)`;
        } else {
            el.style.opacity = '0';
        }
    }

    // Input
    function handleClick(x, y) {
        document.getElementById('msg').style.opacity = '0';
        spawn(x, y);
        addScore(x, y);
    }

    canvas.addEventListener('click', e => handleClick(e.clientX, e.clientY));
    canvas.addEventListener('touchstart', e => {
        e.preventDefault();
        for (const t of e.touches) {
            handleClick(t.clientX, t.clientY);
        }
    }, { passive: false });

    // Mouse trail
    let mouseTrailTimer = 0;
    canvas.addEventListener('mousemove', e => {
        mouseTrailTimer++;
        if (mouseTrailTimer % 3 !== 0) return;
        const pal = ['#a855f7','#00d2ff','#ff6b6b'];
        if (particles.length < MAX_PARTICLES) {
            particles.push({
                x: e.clientX,
                y: e.clientY,
                vx: (Math.random() - 0.5) * 2,
                vy: (Math.random() - 0.5) * 2,
                color: pal[Math.floor(Math.random() * pal.length)],
                life: 0.6,
                decay: 0.02,
                size: 1.5,
                trail: [],
                age: 0,
            });
        }
    });

    // Mode buttons
    document.querySelectorAll('.controls button').forEach(btn => {
        btn.addEventListener('click', e => {
            e.stopPropagation();
            mode = btn.dataset.mode;
            document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        });
    });

    // Keyboard shortcut
    addEventListener('keydown', e => {
        const modes = ['firework','gravity','spiral','rain','blackhole'];
        const idx = parseInt(e.key) - 1;
        if (idx >= 0 && idx < modes.length) {
            mode = modes[idx];
            document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
            document.querySelector(`[data-mode="${mode}"]`).classList.add('active');
        }
    });
    </script>
</body>
</html>
